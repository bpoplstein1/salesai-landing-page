<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blog — Brandon Poplstein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0A0C;--ink:#F5F5F7;--muted:#ABADAE;--line:rgba(245,245,247,.08);--brand:#3EDE6F;--brand-lt:#6DF79A;--brand-2:#21B873;--ink-on-green:#06140B;--grad:linear-gradient(135deg,#6DF79A,#3EDE6F 55%,#21B873)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:#0A0A0C}
  body{background:var(--bg);color:var(--ink);font-family:"Roboto",-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px;width:100%}
  header{position:sticky;top:0;z-index:60;background:#000;border-bottom:1px solid var(--line)}
  .site-nav{display:flex;align-items:center;justify-content:space-between;height:52px}
  .site-brand{font-weight:800;font-size:16px;display:flex;align-items:center;gap:9px}
  .site-brand .bdot{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 8px var(--brand)}
  .site-links{display:flex;gap:28px}
  .site-links a{font-size:14px;font-weight:600;color:var(--muted)}.site-links a:hover{color:var(--ink)}.site-links a.active{color:var(--brand)}
  @media(max-width:560px){.site-links{gap:18px}.site-links a{font-size:13px}}
  .hero{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 0;position:relative;overflow:hidden}
  .glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(62,222,111,.18),transparent 65%);top:-180px;left:50%;transform:translateX(-50%);filter:blur(60px);pointer-events:none}
  .eyebrow{text-transform:uppercase;letter-spacing:.2em;font-size:12px;font-weight:700;color:var(--brand)}
  h1{font-size:clamp(40px,7vw,72px);font-weight:900;letter-spacing:-.03em;line-height:1.05;margin:14px 0 0}
  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);font-size:19px;margin:20px auto 32px;max-width:560px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:15px 30px;border-radius:999px;font-weight:800;font-size:15px;background:var(--brand);color:var(--ink-on-green);box-shadow:0 8px 28px rgba(62,222,111,.28);transition:.2s}
  .btn:hover{transform:translateY(-2px);background:var(--brand-lt)}
  footer{border-top:1px solid var(--line);padding:32px 0;color:var(--muted);font-size:14px;text-align:center}
  /* animated BP lockup (logo) */
  .bp-lockup{display:block;flex-shrink:0;overflow:visible;font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif}
  header .bp-lockup{height:38px}
  footer .bp-lockup{height:44px}
  .bp-halo{transform-box:fill-box;transform-origin:center;filter:blur(5px);animation:bpHalo 3s ease-in-out infinite}
  .bp-glow{transform-box:fill-box;transform-origin:center;filter:blur(1.7px);animation:bpGlow 3s ease-in-out infinite}
  .bp-rip{transform-box:fill-box;transform-origin:center;animation:bpRip 3s cubic-bezier(.2,0,0,1) infinite}
  .bp-rip2{animation-delay:1.5s}
  .bp-node{transform-box:fill-box;transform-origin:center;animation:bpNode 3s ease-in-out infinite}
  @keyframes bpHalo{0%,100%{opacity:.16;transform:scale(.92)}50%{opacity:.5;transform:scale(1.18)}}
  @keyframes bpGlow{0%,100%{opacity:.35}50%{opacity:.9}}
  @keyframes bpRip{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(2.5)}}
  @keyframes bpNode{0%,100%{opacity:1}50%{opacity:.78}}
  @media(prefers-reduced-motion:reduce){.bp-halo,.bp-glow,.bp-rip,.bp-node{animation:none}.bp-halo{opacity:.32}}
</style>
</head>

  <nav class="site-links"><a href="index.html">About</a><a href="salesai.html">SalesAi</a><a href="consulting.html">Consulting</a><a href="blog.html" class="active">Blog</a></nav>
